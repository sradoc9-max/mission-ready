<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mission Ready v2</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<header>
  <div>
    <h1>Mission Ready v2</h1>
    <p>12-week waist-loss + strength tracker</p>
  </div>
  <nav>
    <button onclick="showTab('home')">Home</button>
    <button onclick="showTab('workout')">Workout</button>
    <button onclick="showTab('daily')">Daily</button>
    <button onclick="showTab('progress')">Progress</button>
    <button onclick="showTab('settings')">Settings</button>
  </nav>
</header>

<main>
  <section class="profile-bar">
    <label>Profile
      <select id="profileSelect" onchange="changeProfile()"></select>
    </label>
    <div id="goalChip" class="chip"></div>
  </section>

  <section id="home" class="tab card">
    <h2>Today's Mission</h2>
    <div id="missionList"></div>
    <button onclick="saveMission()">Save Mission Checkboxes</button>
    <h3>Snapshot</h3>
    <div id="snapshot" class="cards"></div>
  </section>

  <section id="workout" class="tab card hidden">
    <h2>Workout Mode</h2>
    <div class="grid">
      <label>Date <input id="workoutDate" type="date"></label>
      <label>Week
        <select id="weekSelect" onchange="loadWorkout()"></select>
      </label>
      <label>Workout
        <select id="workoutSelect" onchange="loadWorkout()"></select>
      </label>
    </div>

    <div id="exerciseNav" class="exercise-nav"></div>
    <div id="workoutContainer"></div>

    <div class="timer">
      <strong>Rest Timer:</strong> <span id="timerDisplay">00:00</span>
      <button onclick="startTimer(90)">90s</button>
      <button onclick="startTimer(120)">2m</button>
      <button onclick="startTimer(180)">3m</button>
      <button onclick="stopTimer()">Stop</button>
    </div>

    <textarea id="workoutNotes" placeholder="Shoulder pain, missed reps, RPE, notes..."></textarea>
    <button onclick="saveWorkout()">Save Workout</button>
    <button onclick="finishWorkout()">Finish + Progress Weights</button>
  </section>

  <section id="daily" class="tab card hidden">
    <h2>Daily Check-In</h2>
    <div class="grid">
      <label>Date <input id="dailyDate" type="date"></label>
      <label>Weight <input id="weight" type="number" step="0.1"></label>
      <label>Waist <input id="waist" type="number" step="0.1"></label>
      <label>Calories <input id="calories" type="number"></label>
      <label>Protein <input id="protein" type="number"></label>
      <label>Steps <input id="steps" type="number"></label>
      <label>Water <input id="water" type="number" step="0.1" placeholder="quarts/liters"></label>
      <label>Sleep <input id="sleep" type="number" step="0.1"></label>
    </div>
    <textarea id="dailyNotes" placeholder="Travel, stress, hunger, soreness, bad sleep..."></textarea>
    <button onclick="saveDaily()">Save Daily Check-In</button>
  </section>

  <section id="progress" class="tab card hidden">
    <h2>Progress</h2>
    <div id="progressCards" class="cards"></div>
    <h3>Exercise History</h3>
    <label>Exercise
      <select id="historyExercise" onchange="renderHistory()"></select>
    </label>
    <div id="history"></div>
    <h3>Team Snapshot</h3>
    <div id="teamSnapshot"></div>
  </section>

  <section id="settings" class="tab card hidden">
    <h2>Settings</h2>

    <h3>Profiles</h3>
    <div id="profileList"></div>
    <div class="grid">
      <label>Name <input id="newName" placeholder="Training partner"></label>
      <label>Start Weight <input id="newStartWeight" type="number" step="0.1"></label>
      <label>Start Waist <input id="newStartWaist" type="number" step="0.1"></label>
      <label>Goal Waist <input id="newGoalWaist" type="number" step="0.1" value="34"></label>
    </div>
    <button onclick="addProfile()">Add Profile</button>

    <h3>Data</h3>
    <button onclick="exportCSV()">Export CSV</button>
    <button onclick="exportJSON()">Export Backup JSON</button>
    <label class="fileBtn">Import Backup JSON <input type="file" accept=".json" onchange="importJSON(event)"></label>
    <button class="danger" onclick="clearData()">Clear This Device</button>
  </section>
</main>

<script src="app.js"></script>
</body>
</html>
